afterEvaluate {
    artifactoryPublish.dependsOn 'BntSwitchAdminPortalBackend:bootWar'
    artifactoryPublish.dependsOn 'generatePomFileForMavenJavaPublication'
	clean.dependsOn 'BntSwitchAdminPortalFrontend:npmInstall'
    clean.dependsOn 'BntSwitchAdminPortalFrontend:npm_run_build'
    build.dependsOn 'cleanAngularApp'
    build.dependsOn 'copyAngularApp'
    build.dependsOn 'copyLibFromBackendToParent'
    
}

