<div class="col-md-12 fade-in template">
  <div class="row row-margin">
    <div class="row pull-right button-margin">
      <button
        *ngIf="permissionObject.write"
        class="btn btn-primary btn-md btn-flat"
        routerLink="create"
      >
        <i class="fa fa-plus-circle"></i>
        {{ 'DESTINATION_END_POINT_CREATE' | translate }}
      </button>
    </div>
  </div>
  <div class="row" [ngClass]="{ loading: loading }">
    <div class="defaultDataTable">
      <ngx-datatable
        appNgxDatatableWatcher
        class="bootstrap fullscreen striped dataTableHeight"
        [loadingIndicator]="loading"
        #myTable
        [rows]="rows"
        [columns]="columns"
        [columnMode]="'force'"
        [headerHeight]="dimensions.headerHeight"
        [footerHeight]="dimensions.footerHeight"
        [rowHeight]="dimensions.rowHeight"
        (scroll)="onScroll($event)"
        [scrollbarV]="true"
      >
        <ngx-datatable-footer appNgxDatatableWatcher>
          <ng-template
            ngx-datatable-footer-template
            let-rowCount="rowCount"
            let-pageSize="pageSize"
            let-selectedCount="selectedCount"
            let-curPage="curPage"
            let-offset="offset"
            let-isVisible="isVisible"
          >
            <div>
              <b>Showing {{ rows.length }} out of {{ totalRecords }} records</b>
            </div>
            <datatable-pager
              appNgxDatatableWatcher
              [pagerLeftArrowIcon]="'datatable-icon-left'"
              [pagerRightArrowIcon]="'datatable-icon-right'"
              [pagerPreviousIcon]="'datatable-icon-prev'"
              [pagerNextIcon]="'datatable-icon-skip'"
              [page]="curPage"
              [size]="pageSize"
              [count]="rowCount"
              [hidden]="!(rowCount / pageSize > 1)"
              (change)="table.onFooterPage($event)"
            >
            </datatable-pager>
          </ng-template>
        </ngx-datatable-footer>
      </ngx-datatable>
    </div>
  </div>
  <ng-template #isSAFEnabled let-row="row" ngx-datatable-cell-template>
    <ng-container>
      <label class="row-tag" *ngIf="row.isSAFEnabled === false"
        ><span>{{ 'NO' | translate }}</span></label
      >
      <label class="row-tag" *ngIf="row.isSAFEnabled === true"
        ><span>{{ 'YES' | translate }}</span></label
      >
    </ng-container>
  </ng-template>
  <ng-template #active let-row="row" ngx-datatable-cell-template>
    <ng-container>
      <!-- <label class="row-tag" *ngIf="row.active === false"
        ><span class="badge badge-danger badges failure-badges">{{
          'INACTIVE' | translate
        }}</span></label
      >
      <label class="row-tag" *ngIf="row.active === true"
        ><span class="badge badge-success badges success-badges">{{
          'ACTIVE' | translate
        }}</span></label
      > -->
      <nz-switch [ngModel]="row.active === false ? false : true" [nzDisabled]="true"></nz-switch>
    </ng-container>
  </ng-template>
  <ng-template #service let-row="row" ngx-datatable-cell-template>
    <ng-container>
      <span class="row-tag">{{ row.lookupvalueId ? row.lookupvalueId.value : null }}</span>
    </ng-container>
  </ng-template>
  <ng-template #cartiage let-row="row" ngx-datatable-cell-template>
    <ng-container>
      <span class="row-tag">{{ row.adapterId ? row.adapterId.name : null }}</span>
    </ng-container>
  </ng-template>
  <ng-template #action let-row="row" ngx-datatable-cell-template>
    <div *ngIf="permissionObject.update">
      <a class="btn-link button-effect" (click)="getRowData(row)" role="button">{{
        'EDIT' | translate
      }}</a>
    </div>
    <div *ngIf="permissionObject.read && !permissionObject.update">
      <a class="btn-link button-effect" (click)="viewItem(row)" role="button">{{
        'VIEW' | translate
      }}</a>
    </div>
  </ng-template>
</div>
<app-not-found [isVisible]="!rows?.length && !loading"></app-not-found>
