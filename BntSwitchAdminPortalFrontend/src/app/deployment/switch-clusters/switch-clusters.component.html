<div class="col-md-12 fade-in template">
  <div class="row row-margin">
    <div class="pull-right row button-margin">
      <button
        class="btn btn-primary btn-md btn-flat"
        routerLink="create"
        *ngIf="permissionObject.write"
      >
        <i class="fa fa-plus-circle"></i> {{ 'CREATE_CLUSTER' | translate }}
      </button>
    </div>
  </div>
  <div class="row" [ngClass]="{ loading: loading }">
    <div style="height: 60vh">
      <ngx-datatable
        appNgxDatatableWatcher
        style="height: 60vh"
        [loadingIndicator]="loading"
        #myTable
        class="bootstrap fullscreen striped"
        [rows]="rows"
        [columns]="columns"
        [columnMode]="'force'"
        [headerHeight]="headerHeight"
        [footerHeight]="20"
        [rowHeight]="rowHeight"
        [scrollbarV]="true"
        (scroll)="onScroll($event)"
      >
        <ngx-datatable-footer appNgxDatatableWatcher>
          <ng-template
            ngx-datatable-footer-template
            let-rowCount="rowCount"
            let-pageSize="pageSize"
            let-selectedCount="selectedCount"
            let-curPage="curPage"
            let-offset="offset"
            let-isVisible="isVisible"
          >
            <div>
              <b>Showing {{ rows.length }} out of {{ totalRecords }} records</b>
            </div>
            <datatable-pager
              appNgxDatatableWatcher
              [pagerLeftArrowIcon]="'datatable-icon-left'"
              [pagerRightArrowIcon]="'datatable-icon-right'"
              [pagerPreviousIcon]="'datatable-icon-prev'"
              [pagerNextIcon]="'datatable-icon-skip'"
              [page]="curPage"
              [size]="pageSize"
              [count]="rowCount"
              [hidden]="!(rowCount / pageSize > 1)"
              (change)="table.onFooterPage($event)"
            >
            </datatable-pager>
          </ng-template>
        </ngx-datatable-footer>
      </ngx-datatable>
    </div>
  </div>

  <ng-template #clusterKey let-row="row"  ngx-datatable-cell-template>
    <ng-container>
    {{ row.clusterKey ? (row.clusterKey) : 'N/A' }}
  </ng-container>
  </ng-template>

  <ng-template #active let-row="row" ngx-datatable-cell-template>
    <ng-container>
      <label class="row-tag" *ngIf="row.active === '0'"
        ><span class="badge badge-danger badges failure-badges">{{
          'INACTIVE' | translate
        }}</span></label
      >
      <label class="row-tag" *ngIf="row.active === '1'"
        ><span class="badge badge-success badges success-badges">{{
          'ACTIVE' | translate
        }}</span></label
      >
    </ng-container>
  </ng-template>

  <ng-template #action let-row="row" ngx-datatable-cell-template>
    <div *ngIf="permissionObject.update">
      <a class="btn-link button-effect" role="button" (click)="getRowData(row)">{{
        'EDIT' | translate
      }}</a>
    </div>
  </ng-template>
</div>
<app-not-found [isVisible]="!rows?.length && !loading"></app-not-found>
