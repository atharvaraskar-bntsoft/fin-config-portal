<div class="col-md-12 fade-in template">
  <div class="row" [ngClass]="{ loading: loading }">
    <div style="height: 80vh">
      <ngx-datatable appNgxDatatableWatcher style="height: 78vh" [loadingIndicator]="loading" #myTable
        class="bootstrap fullscreen striped" [rows]="rows" [columns]="columns" [columnMode]="'force'"
        [headerHeight]="headerHeight" [footerHeight]="40" [rowHeight]="rowHeight" [scrollbarV]="true"
        (scroll)="onScroll($event)">
        <ngx-datatable-footer appNgxDatatableWatcher>
          <ng-template ngx-datatable-footer-template let-rowCount="rowCount" let-pageSize="pageSize"
            let-selectedCount="selectedCount" let-curPage="curPage" let-offset="offset" let-isVisible="isVisible">
            <div>
              <b>Showing {{ rows.length }} out of {{ totalRecords }} records</b>
            </div>
            <datatable-pager appNgxDatatableWatcher [pagerLeftArrowIcon]="'datatable-icon-left'"
              [pagerRightArrowIcon]="'datatable-icon-right'" [pagerPreviousIcon]="'datatable-icon-prev'"
              [pagerNextIcon]="'datatable-icon-skip'" [page]="curPage" [size]="pageSize" [count]="rowCount"
              [hidden]="!(rowCount / pageSize > 1)" (change)="table.onFooterPage($event)">
            </datatable-pager>
          </ng-template>
        </ngx-datatable-footer>
      </ngx-datatable>
    </div>
  </div>
  <ng-template #scheduledOn let-row="row" ngx-datatable-cell-template>
    <ng-container>
      <span class="row-tag dateColor" style="margin-right: 5px"><i class="fa fa-calendar fa-sm"></i>
        {{ row.scheduledOn | newDate }}</span>
    </ng-container>
  </ng-template>

  <ng-template #deployedOn let-row="row" ngx-datatable-cell-template>
    <ng-container>
      <span *ngIf="row.deployedOn;else other_content" class="row-tag dateColor"><i class="fa fa-calendar fa-sm"> </i>
        {{ row.deployedOn | newDate }}</span>
      <ng-template #other_content>N/A</ng-template>
    </ng-container>
  </ng-template>

  <ng-template #viewDetails let-row="row" ngx-datatable-cell-template>
    <div *ngIf="permissionObject.read">
      <a class="btn-link button-effect" role="button" (click)="getRowData(row)">{{
        'VIEWDETAILS' | translate
        }}</a>
    </div>
  </ng-template>
</div>
<app-not-found [isVisible]="!rows?.length && !loading"></app-not-found>
