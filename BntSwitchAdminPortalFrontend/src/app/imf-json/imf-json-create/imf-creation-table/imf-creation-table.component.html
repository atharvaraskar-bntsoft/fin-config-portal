<div *ngIf="isTableVisible" class="table_container">
  <h3>Edit Properties</h3>
  <table class="table table-bordered">
    <thead>
      <tr>
        <th class="table_header">{{ 'PROPERTY_NAME' | translate }}</th>
        <th class="table_header">{{ 'PROPERTY_VALUE' | translate }}</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th scope="row">
          <label class="required">{{ 'FIELDS_NAMES' | translate }}</label>
        </th>
        <td>
          <input
            *ngIf="imfObj?.type === 'field'"
            (keyup)="isFormValid()"
            name="fieldName curly_show"
            pattern="[a-z_]+"
            [disabled]="!imfObj.isEditable"
            onkeypress="return event.charCode == 95 || event.charCode >= 97 &&  event.charCode <= 122"
            type="text"
            [(ngModel)]="imfObj.fieldName"
            placeholder="key"
            required
            class="form-control"
          />
          <span class="curly_show_text">
            {{ imfObj.fieldType === 'ARRAY' ? '[ ]' : '' }}
          </span>

          <!-- For Name Editing Purpose -->
          <input
            *ngIf="imfObj?.type === 'fields'"
            (keyup)="isFormValid()"
            [disabled]="!imfObj.isEditable"
            name="fieldName"
            pattern="[a-z_]+"
            onkeypress="return event.charCode == 95 || event.charCode >= 97 &&  event.charCode <= 122"
            type="text"
            [(ngModel)]="imfObj.name"
            placeholder="key"
            required
            class="form-control"
          />
        </td>
      </tr>
      <tr *ngIf="imfObj?.type === 'field'">
        <th scope="row">
          <label class="required">{{ 'ALIAS' | translate }}</label>
        </th>
        <td>
          <input
            name="alias"
            [disabled]="!imfObj.isEditable"
            class="form-control"
            (keyup)="isFormValid()"
            required
            type="text"
            [(ngModel)]="imfObj.alias"
            placeholder="Alias"
          />
        </td>
      </tr>
      <tr *ngIf="imfObj?.type === 'field'">
        <th scope="row">
          <label class="required">{{ 'FIELD_TYPE' | translate }}</label>
        </th>
        <td>
          <ng-select
            [placeholder]="'Data Type'"
            [disabled]="!imfObj.isEditable"
            [items]="types"
            (change)="isFormValid()"
            [(ngModel)]="imfObj.fieldType"
            *ngIf="imfObj?.type === 'field'"
          >
          </ng-select>
        </td>
      </tr>
      <tr *ngIf="imfObj?.type === 'field'" [hidden]="imfObj.fieldName === 'account_number' || imfObj.fieldName === 'account_number_extended' || imfObj.fieldName === 'account_number_masked'">
        <th scope="row">
          <label>{{ 'SENSITIVES' | translate }}</label>
        </th>
        <td>
          <nz-switch [disabled]="imfObj.fieldName === 'account_number' || imfObj.fieldName === 'account_number_extended' || imfObj.fieldName === 'account_number_masked'" [(ngModel)]="imfObj.isSensitive"></nz-switch>
        </td>
      </tr>
      <tr *ngIf="imfObj?.type === 'field'" [hidden]="imfObj.fieldName === 'track1' || imfObj.fieldName === 'track2' || imfObj.fieldName === 'track3'" [(ngModel)]="imfObj.isPersist">
        <th scope="row">
          <label>{{ 'PERSISTS' | translate }}</label>
        </th>
        <td>
          <nz-switch [disabled]="imfObj.fieldName === 'track1' || imfObj.fieldName === 'track2' || imfObj.fieldName === 'track3'" [(ngModel)]="imfObj.isPersist"></nz-switch>
        </td>
      </tr>
      <tr *ngIf="imfObj?.type === 'field'">
        <th scope="row">
          <label>{{ 'HIDES' | translate }}</label>
        </th>
        <td>
          <nz-switch [(ngModel)]="imfObj.isHide"></nz-switch>
        </td>
      </tr>
      <tr *ngIf="imfObj?.type === 'field'" [hidden]="imfObj.fieldName === 'account_number' || imfObj.fieldName === 'account_number_extended' || imfObj.fieldName === 'account_number_masked' || imfObj.fieldName === 'track1' || imfObj.fieldName === 'track2' || imfObj.fieldName === 'track3'">
        <th scope="row">
          <label>{{ 'PATTERN' | translate }}</label>
          <mat-icon [matTooltip]="imfPattern" [inline]="true" matTooltipClass="material-tooltip"
            >info
          </mat-icon>
        </th>
        <td>
          <input
          [disabled]="imfObj.fieldName === 'account_number' || imfObj.fieldName === 'account_number_extended' || imfObj.fieldName === 'account_number_masked' || imfObj.fieldName === 'track1' || imfObj.fieldName === 'track2' || imfObj.fieldName === 'track3'"
            class="form-control show_info"
            [(ngModel)]="imfObj.pattern"
            placeholder="Pattern"
          />
          <!-- <div class="pattern-info" >
            <ol>
              <li *ngFor="let item of imfPattern">{{item}}</li>
            </ol>
          </div> -->
        </td>
      </tr>
    </tbody>
  </table>
  <div>
    <button
      class="buttons_color"
      [disabled]="!isSaveEnable"
      mat-button
      (click)="submitIMF('save')"
      s
    >
      {{ 'SAVE' | translate }}
    </button>
    <button mat-button class="buttons_color button_space" (click)="submitIMF('cancel')">
      {{ 'CANCEL' | translate }}
    </button>
    <button mat-button class="buttons_color" (click)="openDeleteDialog()" *ngIf="imfObj.isEditable">
      Delete Field(s)
    </button>
  </div>
</div>

<!-- For Delete Purpose -->

<div
  class="modal fade"
  tabindex="-1"
  [ngClass]="{ in: visibleAnimate }"
  [ngStyle]="{
    display: visible ? 'block' : 'none',
    opacity: visibleAnimate ? 1 : 1
  }"
  *ngIf="visible"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title">
          {{ 'CONFIRMDELETE' | translate }}
          <button
            class="close pull-right"
            data-dismiss="modal"
            type="button"
            aria-label="Close"
            (click)="cancel()"
          >
            ×
          </button>
        </h4>
        <div class="modal-body">
          <table class="table table-striped">
            {{
              'DELETE_MSG' | translate
            }}
          </table>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-flat" (click)="cancel()">
          {{ 'CLOSE' | translate }}
        </button>
        <button class="btn btn-danger btn-flat pull-right" (click)="submitIMF('delete')">
          {{ 'DELETE' | translate }}
        </button>
      </div>
    </div>
  </div>
</div>
