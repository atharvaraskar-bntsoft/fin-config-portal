<div class="col-md-12 fade-in template">
  <nz-spin [nzSpinning]="loading" nzTip="Loading...">
    <div class="">
      <div style="height: 80vh">
        <ngx-datatable
          appNgxDatatableWatcher
          style="height: 78vh"
          class="bootstrap fullscreen striped"
          [rows]="currentItem"
          [columns]="columns"
          [columnMode]="'force'"
          [headerHeight]="headerHeight"
          [footerHeight]="40"
          [rowHeight]="rowHeight"
          [scrollbarV]="true"
        >
        </ngx-datatable>
      </div>
    </div>
    <ng-template #Action let-row="row" ngx-datatable-cell-template>
      <a class="btn-link button-effect" role="button" [matMenuTriggerFor]="belowMenu">{{
        'ACTIONS' | translate
      }}</a>
      <mat-menu #belowMenu="matMenu">
        <button mat-menu-item (click)="viewClick(row)" *ngIf="permissionObject.read">
          <i class="fa fa-eye fa-sm" aria-hidden="true" style="color: #3c8dbc"></i>
          <span style="color: #3c8dbc; margin-left: 10px">{{ 'VIEW' | translate }}</span>
        </button>
        <mat-divider *ngIf="row.edit"></mat-divider>

        <ng-container *ngIf="row.edit">
          <button mat-menu-item (click)="viewEditClick(row)" *ngIf="permissionObject.update">
            <i class="fa fa-pencil-square-o fa-sm" aria-hidden="true" style="color: #3c8dbc"></i>
            <span style="color: #3c8dbc; margin-left: 10px">{{ 'EDIT' | translate }}</span>
          </button></ng-container
        >
        <mat-divider *ngIf="row.delete"></mat-divider>

        <ng-container *ngIf="row.delete">
          <button mat-menu-item (click)="deleteRow(row)" *ngIf="permissionObject.delete">
            <i class="fa fa-trash fa-sm" aria-hidden="true" style="color: #f46771"></i>
            <span class="delete-color" style="margin-left: 10px">{{ 'DELETE' | translate }}</span>
          </button></ng-container
        >
        <mat-divider></mat-divider>
		

        <ng-container>
          <button mat-menu-item (click)="compareJson()" *ngIf="permissionObject.update">
            <i class="fa fa-book-open" aria-hidden="true" style="color: #3c8dbc"></i>
            <span style="color: #3c8dbc; margin-left: 10px">{{ 'IMF version comparison' | translate }}</span>
          </button></ng-container
        >
		<ng-container>
		  <button
		    mat-menu-item
		    (click)="downloadImf(row)"
		    *ngIf="permissionObject.read"
		  >
		    <i class="fa fa-download" style="color: #3c8dbc"></i>
		    <span style="margin-left: 10px">Download IMF</span>
		  </button>
		</ng-container>

      </mat-menu>
    </ng-template>

    <ng-template #version let-row="row" ngx-datatable-cell-template>
      <div class="filteroverlapTemplate">
        <ng-select
          class="filter-shadow"
          bindLabel="version"
          [closeOnSelect]="true"
          [items]="rows"
          [clearable]="false"
          [(ngModel)]="selectedImf"
          (change)="getImfData($event)"
        >
        </ng-select>
      </div>
    </ng-template>

    <div
      class="modal fade"
      tabindex="-1"
      [ngClass]="{ in: visibleAnimate }"
      [ngStyle]="{
        display: visible ? 'block' : 'none',
        opacity: visibleAnimate ? 1 : 1
      }"
      *ngIf="visible"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            {{ element.name }}
            <a
              role="button"
              class="pull-right"
              data-toggle="tooltip"
              title="Copy"
              (click)="copyToClipboard(jsonObj)"
            >
              <i class="fa fa-copy fa-lg"></i
            ></a>
            <span class="pull-right col-sm-2" *ngIf="copied">{{ 'COPIED' | translate }}</span>
          </div>
          <div class="modal-body" style="max-height: 450px; overflow: auto">
            <rv-pretty-json [obj]="jsonObj"></rv-pretty-json>
          </div>
          <div class="modal-footer">
            <button class="btn col-md-3 btn-flat pull-right" (click)="close()">
              {{ 'CLOSE' | translate }}
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      tabindex="-1"
      [ngClass]="{ in: deleteVisibleAnimate }"
      [ngStyle]="{
        display: deleteVisible ? 'block' : 'none',
        opacity: deleteVisibleAnimate ? 1 : 1
      }"
      *ngIf="deleteVisible"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h4 class="modal-title">
              {{ 'CONFIRMDELETE' | translate }}
              <button
                class="close pull-right"
                data-dismiss="modal"
                type="button"
                aria-label="Close"
                (click)="closeDelete()"
              >
                ×
              </button>
            </h4>
            <div class="modal-body">
              <table class="table table-striped">
                {{
                  'DEVICE_DELETE' | translate
                }}
              </table>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-flat" (click)="closeDelete()">
              {{ 'CLOSE' | translate }}
            </button>
            <button class="btn btn-danger btn-flat pull-right" (click)="delete()">
              {{ 'DELETE' | translate }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </nz-spin>
</div>

<nz-modal
  style="height: 600px;"
  [(nzVisible)]="imfVisible"
  nzTitle="Json Compare"
  [nzFooter]="ModalFooter"
  nzClosable="true"
  (nzOnCancel)="closePopup()"
  [nzWidth]="1100"
>
<ng-container *nzModalContent>
  <app-json-compare [type]="type" style="height: 500px;" *ngIf="imfVisible"></app-json-compare>
</ng-container>
</nz-modal>
<ng-template #ModalFooter>
</ng-template>
<app-not-found [isVisible]="!rows?.length && !loading"></app-not-found>
