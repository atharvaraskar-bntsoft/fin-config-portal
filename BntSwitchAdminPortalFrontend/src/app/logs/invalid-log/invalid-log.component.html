<nz-spin [nzSpinning]="loading" nzTip="Loading...">
<div class="col-md-12 fade-in template" *ngIf="!detailsFlag">
  <div class="row">
    <ngx-datatable
      appNgxDatatableWatcher
      style="height: 78vh"
      [loadingIndicator]="loading"
      #myTable
      class="bootstrap fullscreen striped"
      [rows]="rows"
      [columns]="columns"
      [columnMode]="'force'"
      [headerHeight]="headerHeight"
      [footerHeight]="40"
      [rowHeight]="rowHeight"
      [scrollbarV]="true"
      (scroll)="onScroll($event)"
    >
      <ngx-datatable-footer appNgxDatatableWatcher>
        <ng-template
          ngx-datatable-footer-template
          let-rowCount="rowCount"
          let-pageSize="pageSize"
          let-selectedCount="selectedCount"
          let-curPage="curPage"
          let-offset="offset"
          let-isVisible="isVisible"
        >
          <div>
            <b>Showing {{ rows?.length }} out of {{ totalRecords }} records</b>
          </div>
          <datatable-pager
            appNgxDatatableWatcher
            [pagerLeftArrowIcon]="'datatable-icon-left'"
            [pagerRightArrowIcon]="'datatable-icon-right'"
            [pagerPreviousIcon]="'datatable-icon-prev'"
            [pagerNextIcon]="'datatable-icon-skip'"
            [page]="curPage"
            [size]="pageSize"
            [count]="rowCount"
            [hidden]="!(rowCount / pageSize > 1)"
            (change)="table.onFooterPage($event)"
          >
          </datatable-pager>
        </ng-template>
      </ngx-datatable-footer>
    </ngx-datatable>
  </div>
</div>
</nz-spin>
<ng-template #processingStatus let-row="row" ngx-datatable-cell-template>
  <ng-container>
    <span class="row-tag"> {{ row.processingStatus }} </span>
  </ng-container>
</ng-template>

<ng-template #transactionTime let-row="row" ngx-datatable-cell-template>
  <ng-container>
    <span class="row-tag">{{ row.transactionTime | newDate }}</span>
    <br />
    <span class="row-tag">{{ row.transactionTime | newDate }}</span>
  </ng-container>
</ng-template>

<ng-template #viewDetails let-row="row" ngx-datatable-cell-template>
  <div>
    <a class="btn-link button-effect" role="button" (click)="keyDetails(row)">View Raw Message</a>
  </div>
</ng-template>

<div
  class="modal fade"
  tabindex="-1"
  [ngClass]="{ in: visibleAnimate }"
  [ngStyle]="{
    display: visible ? 'block' : 'none',
    opacity: visibleAnimate ? 1 : 1
  }"
  *ngIf="visible"
>
  <div class="modal-dialog" style="width: 630px; position: absolute; top: 70px; left: 30%">
    <div class="modal-content">
      <div class="modal-header">Raw Message</div>
      <div class="modal-body" style="height: 70vh; overflow: auto">
        <pre>  {{ keyData }} </pre>
      </div>
      <div class="modal-footer">
        <button class="btn col-md-3 btn-flat pull-right" (click)="close()">
          {{ 'CLOSE' | translate }}
        </button>
      </div>
    </div>
  </div>
</div>
<app-not-found [isVisible]="!rows?.length && !loading"></app-not-found>
