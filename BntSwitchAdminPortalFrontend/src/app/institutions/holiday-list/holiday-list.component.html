<div class="col-md-12 fade-in template">
  <div class="row" [ngClass]="{ loading: loading }">
      <ngx-datatable appNgxDatatableWatcher [loadingIndicator]="loading" #myTable class="bootstrap fullscreen striped datatable-body" [rows]="data"
        [columns]="columns" [headerHeight]="headerHeight" columnMode="force" [footerHeight]="40" [rowHeight]="rowHeight" [scrollbarV]="true"
        (scroll)="onScroll($event)">
        <ngx-datatable-footer appNgxDatatableWatcher>
          <ng-template ngx-datatable-footer-template let-rowCount="rowCount" let-pageSize="pageSize"
            let-selectedCount="selectedCount" let-curPage="curPage" let-offset="offset" let-isVisible="isVisible">
            <datatable-pager appNgxDatatableWatcher [pagerLeftArrowIcon]="'datatable-icon-left'"
              [pagerRightArrowIcon]="'datatable-icon-right'" [pagerPreviousIcon]="'datatable-icon-prev'"
              [pagerNextIcon]="'datatable-icon-skip'" [page]="curPage" [size]="pageSize" [count]="rowCount"
              [hidden]="!(rowCount / pageSize > 1)" (change)="table.onFooterPage($event)">
            </datatable-pager>
          </ng-template>
        </ngx-datatable-footer>
      </ngx-datatable>
  </div>
  <ng-template #country let-row="row" ngx-datatable-cell-template>
    <span class="row-tag">{{ row?.countryId.name }}</span>
  </ng-template>

  <ng-template #cutoftime let-row="row" ngx-datatable-cell-template>
    <span class="row-tag">{{ row.cuttOffTime }}</span>
  </ng-template>

  <ng-template #weekly let-row="row" ngx-datatable-cell-template>
    <span class="row-tag" nz-popover
      nzPopoverContent="{{ row.holidayList.weekOffDays.join(', ') }}">{{ row.holidayList.weekOffDays[0] }}...</span>
  </ng-template>

  <ng-template #dateformat let-row="row" ngx-datatable-cell-template>
    <span class="row-tag">{{ row.holidayList.dateFormat}}</span>
  </ng-template>

  <ng-template #days let-row="row" ngx-datatable-cell-template>
    <span class="row-tag" nz-popover 
      nzPopoverContent="{{ row.holidayList.holidays.join(', ') }}">{{
      row.holidayList.holidays[0]}}...</span>
  </ng-template>
</div>
