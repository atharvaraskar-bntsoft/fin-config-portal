<div class="col-md-12 margintop fade-in template">
  <div>
    <a class="btn" routerLink="/approvals/approvals"
      ><i class="fa fa-arrow-circle-o-left fa-sm"></i> {{ 'BACK' | translate }}</a
    >
    <a class="btn-link button-effect" style="float: right" role="button" (click)="open()">{{
      'VIEW_JSON' | translate
    }}</a>
  </div>
  <table class="table" *ngIf="approvaldetails.length === 0">
    <thead class="header-color">
      <tr>
        <th class="header-text-color" scope="col">ID</th>
        <th class="header-text-color" scope="col">operationType</th>
        <th class="header-text-color" scope="col">entityType</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th scope="row">{{ rows.id }}</th>
        <td>CREATE</td>
        <td>{{ rows.entityType }}</td>
      </tr>
    </tbody>
  </table>
  <div *ngIf="approvaldetails.length">
    <div class="defaultDataTable">
      <ngx-datatable
        appNgxDatatableWatcher
        class="bootstrap fullscreen striped dataTableHeight"
        [rows]="approvaldetailsData"
        [columns]="columns"
        [columnMode]="'force'"
        [headerHeight]="dimensions.headerHeight"
        [footerHeight]="dimensions.footerHeight"
        [rowHeight]="dimensions.rowHeight"
        [scrollbarH]="true"
      >
      </ngx-datatable>
    </div>
    <ng-template #newValue let-row="row" ngx-datatable-cell-template>
      <ng-container>
        <span data-toggle="tooltip" title="{{ row.newValue }}"
          >{{ row.newValue | slice: 0:20 }}<span *ngIf="row.newValue.length > 20">...</span></span
        >
      </ng-container>
    </ng-template>
    <ng-template #oldValue let-row="row" ngx-datatable-cell-template>
      <ng-container>
        <span data-toggle="tooltip" title="{{ row.oldValue }}"
          >{{ row.oldValue | slice: 0:20 }}<span *ngIf="row.oldValue.length > 20">...</span></span
        >
      </ng-container>
    </ng-template>
    <ng-template #operationType let-row="row" ngx-datatable-cell-template>
      <ng-container>
        <span>{{ row.operationType }}</span>
      </ng-container>
    </ng-template>
  </div>
  <!-- <pre>
    {{ jsonView | json }}
  </pre> -->
  <textarea
    class="main-field form-control col-6"
    placeholder="{{ 'COMMENT' | translate }}"
    [(ngModel)]="comment"
  ></textarea>
  <fieldset class="main-field">
    <div class="button-margin-approval">
      <button class="btn marginright btn-primary" (click)="onApprove()">
        {{ 'APPROVE' | translate }}
      </button>
      <button class="btn marginright btn-primary" (click)="onReject()">
        {{ 'REJECT' | translate }}
      </button>
      <button class="btn btn-primary" [routerLink]="'/approvals/approvals'">
        {{ 'CANCEL' | translate }}
      </button>
    </div>
  </fieldset>
  <div
    class="modal fade"
    tabindex="-1"
    [ngClass]="{ in: visibleAnimate }"
    [ngStyle]="{
      display: visible ? 'block' : 'none',
      opacity: visibleAnimate ? 1 : 1
    }"
    *ngIf="visible"
  >
    <div class="modal-dialog" style="width: 630px">
      <div class="modal-content">
        <div class="modal-header">JSON View</div>
        <div class="modal-body" style="height: 70vh; overflow: auto">
          <rv-pretty-json [obj]="jsonView"></rv-pretty-json>
        </div>
        <div class="modal-footer">
          <button class="btn col-md-3 btn-flat pull-right" (click)="close()">
            {{ 'CLOSE' | translate }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
