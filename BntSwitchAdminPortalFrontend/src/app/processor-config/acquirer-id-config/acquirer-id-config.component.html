<div class="col-md-12 fade-in template">
  <div class="row" [ngClass]="{ loading: loading }">
    <div style="height: 80vh">
      <ngx-datatable
        appNgxDatatableWatcher
        style="height: 78vh"
        [loadingIndicator]="loading"
        #myTable
        class="bootstrap fullscreen striped"
        [rows]="rows"
        [columns]="columns"
        [columnMode]="'force'"
        [headerHeight]="headerHeight"
        [footerHeight]="40"
        [rowHeight]="rowHeight"
        [scrollbarV]="true"
        (scroll)="onScroll($event)"
      >
        <ngx-datatable-footer appNgxDatatableWatcher>
          <ng-template
            ngx-datatable-footer-template
            let-rowCount="rowCount"
            let-pageSize="pageSize"
            let-selectedCount="selectedCount"
            let-curPage="curPage"
            let-offset="offset"
            let-isVisible="isVisible"
          >
            <div>
              <b>Showing {{ rows.length }} out of {{ totalRecords }} records</b>
            </div>

            <datatable-pager
              appNgxDatatableWatcher
              [pagerLeftArrowIcon]="'datatable-icon-left'"
              [pagerRightArrowIcon]="'datatable-icon-right'"
              [pagerPreviousIcon]="'datatable-icon-prev'"
              [pagerNextIcon]="'datatable-icon-skip'"
              [page]="curPage"
              [size]="pageSize"
              [count]="rowCount"
              [hidden]="!(rowCount / pageSize > 1)"
              (change)="table.onFooterPage($event)"
            >
            </datatable-pager>
          </ng-template>
        </ngx-datatable-footer>
      </ngx-datatable>
    </div>
  </div>
  <ng-template #refundOffline let-row="row" ngx-datatable-cell-template>
    <nz-switch [ngModel]="row.refundOffline === '0' ? false : true" [nzDisabled]="true">
    </nz-switch>
  </ng-template>
  <ng-template #actions let-row="row" ngx-datatable-cell-template>
    <div *ngIf="acquirerConditionflag === 'true'">
      <!-- <a class="btn-link button-effect" role="button" (click)="onActivate(row)">{{
        'VIEW_DETAILS' | translate
      }}</a> -->
      <a class="btn-link button-effect" role="button" (click)="viewDetails(row.id)">View Details</a>
    </div>
  </ng-template>

  <ng-template #status let-row="row" ngx-datatable-cell-template>
    <ng-container>
      <nz-switch
        [ngModel]="row.active"
        (ngModelChange)="changeStatus(row)"
        [nzLoading]="statusLoading"
        [nzDisabled]="true"
      >
      </nz-switch>
    </ng-container>
  </ng-template>

  <ng-template #advicematch let-row="row" ngx-datatable-cell-template>
    <ng-container>
      <nz-switch [ngModel]="row.adviceMatch == '1' ? true : false" [nzDisabled]="true"> </nz-switch>
    </ng-container>
  </ng-template>

  <ng-template #onusValidation let-row="row" ngx-datatable-cell-template>
    <ng-container>
      <nz-switch
        [ngModel]="row.onusValidate == '1' ? true : false"
        (ngModelChange)="changeValidation($event, row)"
        [nzDisabled]="true"
      >
      </nz-switch>
    </ng-container>
  </ng-template>
</div>

<app-not-found [isVisible]="!rows?.length && !loading"></app-not-found>

<div *ngIf="isvisibleView">
  <nz-drawer
    [nzVisible]="isvisibleView"
    [nzWidth]="800"
    [nzTitle]="title"
    (nzOnClose)="close()"
    [nzMaskClosable]="false"
  >
    <ng-container *nzDrawerContent>
      <app-acquirer-id-config-info
        [isvisibleView]="isvisibleView"
        [idView]="idView"
        (closeDrawer)="close($event)"
        (create)="create($event)"
      >
      </app-acquirer-id-config-info>
    </ng-container>
  </nz-drawer>
</div>
