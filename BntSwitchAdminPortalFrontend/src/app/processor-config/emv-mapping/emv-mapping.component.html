<nz-spin style="height: 600px"   [nzSpinning]="loading" nzTip="Loading...">
<div class="col-md-12 fade-in template">
  <div class="row" [ngClass]="{ loading: loading }">
    <div>
      <ngx-datatable
        appNgxDatatableWatcher
        class="bootstrap fullscreen striped"
        #myTable
        [rows]="rows"
        [columns]="columns"
        [columnMode]="'force'"
        [headerHeight]="headerHeight"
        [footerHeight]="40"
        [rowHeight]="rowHeight"
        [scrollbarV]="true"
        [count]="totalElements"
        (scroll)="onScroll($event)"
      >
        <ngx-datatable-footer appNgxDatatableWatcher>
          <ng-template
            ngx-datatable-footer-template
            let-rowCount="rowCount"
            let-pageSize="pageSize"
            let-selectedCount="selectedCount"
            let-curPage="curPage"
            let-offset="offset"
            let-isVisible="isVisible"
          >
            <div>
              <b>Showing {{ rows?.length }} out of {{ totalElements }} records</b>
            </div>
            <datatable-pager
              appNgxDatatableWatcher
              [pagerLeftArrowIcon]="'datatable-icon-left'"
              [pagerRightArrowIcon]="'datatable-icon-right'"
              [pagerPreviousIcon]="'datatable-icon-prev'"
              [pagerNextIcon]="'datatable-icon-skip'"
              [page]="curPage"
              [size]="pageSize"
              [count]="rowCount"
              [hidden]="!(rowCount / pageSize > 1)"
              (change)="table.onFooterPage($event)"
            >
            </datatable-pager>
          </ng-template>
        </ngx-datatable-footer>
      </ngx-datatable>
      <app-not-found [isVisible]="!rows?.length && !loading"></app-not-found>
    </div>
  </div>
</div>
</nz-spin>
<ng-template #version let-row="row" ngx-datatable-cell-template>
  <div class="filteroverlapTemplate">
    <ng-select
      class="filter-shadow"
      bindLabel="version"
      [closeOnSelect]="true"
      appendTo="body"
      [items]="row.deviceModelConfiguration"
      [clearable]="false"
      [ngModel]="row.version"
      (change)="updateTableRow($event, row)"
    >
    </ng-select>
  </div>
</ng-template>

<ng-template #active let-row="row" ngx-datatable-cell-template>
  <ng-container>
    <nz-switch [ngModel]="row?.active === '1' ? true : false" disabled> </nz-switch>
  </ng-container>
</ng-template>
<ng-template #emvData let-row="row" ngx-datatable-cell-template>
  <span class="version" (click)="ViewXMLData(row)"> View Data </span>
</ng-template>

<!-- Modal Handling -->

<nz-modal [(nzVisible)]="isVisible" [nzTitle]="title" (nzOnCancel)="cancel()">
  <div>
    <div class="form-group">
      <label class="required">{{ 'DeviceTypes' | translate }}</label>
      <ng-select
        [clearable]="false"
        required
        [(ngModel)]="emvForm.device"
        bindValue="id"
        bindLabel="code"
        [closeOnSelect]="true"
        [items]="deviceList"
        placeholder="Select Device List"
        [disabled]="id"
      >
      </ng-select>
    </div>
    <div class="form-group">
      <label class="required">{{ 'MODEL_NAME' | translate }}</label>
      <input
        class="form-control"
        required
        [(ngModel)]="emvForm.modelName"
        placeholder="Model Name"
        maxlength="50"
        (change)="isNameValid($event)"
        [disabled]="id"
      />
      <span class="error" *ngIf="emvForm.modelName && (isValidName | async) === false"
        >{{ emvForm?.modelName }} already Exists</span
      >
    </div>
    <app-upload-media
      *ngIf="emvForm?.device && emvForm?.modelName"
      [allowedMimeType]="'text/xml'"
      (selectedFile)="selectedFile($event)"
    ></app-upload-media>
  </div>

  <div *nzModalFooter>
    <button class="btn btn-primary btn-md btn-flat" (click)="cancel()">
      {{ 'CLOSE' | translate }}
    </button>
    <button class="btn btn-primary btn-md btn-flat" (click)="submitEMV($event)">
      {{ 'SAVE' | translate }}
    </button>
  </div>
</nz-modal>

<nz-modal
  [nzWidth]="840"
  [(nzVisible)]="isXMLDataVisible"
  [nzTitle]="'Uploaded EMV Data'"
  (nzOnCancel)="cancelXML()"
>
  <!-- <div ace-editor [(text)]="XMLdata" [theme]="'eclipse'" class="editor"></div> -->
  <div>
    <ngx-monaco-editor class="editor" [options]="editorOptions" [(ngModel)]="XMLdata"></ngx-monaco-editor>
  </div>
  <div *nzModalFooter>
    <button class="btn btn-primary btn-md btn-flat" (click)="cancelXML()">
      {{ 'CLOSE' | translate }}
    </button>
  </div>
</nz-modal>
