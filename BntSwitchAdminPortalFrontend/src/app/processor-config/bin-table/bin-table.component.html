<div class="col-md-12 fade-in template">
  <!-- <div class="row row-margin">
    <div class="row pull-right button-margin">
      <button class="btn btn-primary btn-md btn-flat" (click)="openDialog()">
        <i class="fa fa-cloud-upload"></i> {{ 'IMPORT' | translate }}
      </button>
    </div>
  </div> -->
  <div class="row" [ngClass]="{ loading: loading }">
    <div>
      <ngx-datatable
        appNgxDatatableWatcher
        [loadingIndicator]="loading"
        #myTable
        class="bootstrap fullscreen striped"
        [rows]="binTableData"
        [columns]="columns"
        [columnMode]="'force'"
        [headerHeight]="headerHeight"
        [footerHeight]="40"
        [rowHeight]="rowHeight"
        [scrollbarV]="true"
        (scroll)="onScroll($event)"
      >
        <ngx-datatable-footer appNgxDatatableWatcher>
          <ng-template
            ngx-datatable-footer-template
            let-rowCount="rowCount"
            let-pageSize="pageSize"
            let-selectedCount="selectedCount"
            let-curPage="curPage"
            let-offset="offset"
            let-isVisible="isVisible"
          >
            <div>
              <b>Showing {{ binTableData.length }} out of {{ totalRecords }} records</b>
            </div>
            <datatable-pager
              appNgxDatatableWatcher
              [pagerLeftArrowIcon]="'datatable-icon-left'"
              [pagerRightArrowIcon]="'datatable-icon-right'"
              [pagerPreviousIcon]="'datatable-icon-prev'"
              [pagerNextIcon]="'datatable-icon-skip'"
              [page]="curPage"
              [size]="pageSize"
              [count]="rowCount"
              [hidden]="!(rowCount / pageSize > 1)"
              (change)="table.onFooterPage($event)"
            >
            </datatable-pager>
          </ng-template>
        </ngx-datatable-footer>
      </ngx-datatable>
    </div>
  </div>
  <ng-template #status let-row="row" ngx-datatable-cell-template>
    <!-- <ng-container>
            <label class="row-tag" *ngIf="row.active == '0'"
                ><span class="badge badge-danger badges failure-badges">{{
                    'INACTIVE' | translate
                }}</span></label
            >
            <label class="row-tag" *ngIf="row.active == '1'"
                ><span class="badge badge-success badges success-badges">{{
                    'ACTIVE' | translate
                }}</span></label
            >
        </ng-container> -->

    <nz-switch [ngModel]="row.active == '0' ? false : true" [nzDisabled]="true"> </nz-switch>
  </ng-template>

  <ng-template #activatedOn let-row="row" ngx-datatable-cell-template>
    <ng-container>
      <span class="row-tag">{{ row.activateOn | newDate }}</span
      ><br />
      <!-- <span class="row-tag">{{ row.activateOn | date: 'h:mm:ss' }}</span> -->
    </ng-container>
  </ng-template>

  <ng-template #uplodedOn let-row="row" ngx-datatable-cell-template>
    <ng-container>
      <span class="row-tag">{{ row.uploadedOn | newDate }}</span
      ><br />
      <!-- <span class="row-tag">{{ row.uploadedOn | date: 'h:mm:ss' }}</span> -->
    </ng-container>
  </ng-template>

  <ng-template #fileName let-row="row" ngx-datatable-cell-template>
    <a *ngIf="row.fileName" class="cursor linkMargin" [routerLink]="['bin-table-details', row.id]">
      {{ row.fileName }}
    </a>
  </ng-template>
</div>
<!-- </div> -->

<!-- Dialog for date -->

<div
  class="modal fade"
  tabindex="-1"
  [ngClass]="{ in: visiblePopUpAnimate }"
  [ngStyle]="{
    display: visiblePopUp ? 'block' : 'none',
    opacity: visiblePopUpAnimate ? 1 : 1
  }"
  *ngIf="visiblePopUp"
>
  <div class="modal-dialog">
    <div class="modal-content sizeWidth">
      <div class="modal-header import-header">
        <h4 class="modal-title" style="text-align: center">
          {{ 'IMPORT_A_FILE' | translate }}
        </h4>
      </div>
      <div class="modal-body">
        <div class="row">
          <div class="col-md-6">
            <span style="color: #1890ff; font-style: italic">
              <app-upload-media
                [multiSelectFile]="multiSelectFile"
                (selectedFile)="selectedFile($event)"
                [allowedMimeType]="allowedMimeType"
              ></app-upload-media>
            </span>
          </div>
          <div class="col-md-6" [style.margin-top.px]="15">
            <div class="input-group col-md-3">
              <div class="insertBox mainImport">
                <label class="required scheduleDate">{{ 'SCHEDULE_DATE' | translate }}</label>
                <input
                  class="form-control input-calender inputCalender"
                  [onlyDatePicker]="true"
                  placeholder="Schedule Date"
                  [(ngModel)]="activatedOnModel"
                  [minimumDate]="true"
                  (dateChange)="onScheduleDateChange($event)"
                  rv-myDatepicker
                />
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary btn-md btn-flat" (click)="cancelPopUp()">
          {{ 'CLOSE' | translate }}
        </button>
        <button class="btn btn-primary btn-md btn-flat" (click)="saveUpload($event)">
          {{ 'SAVE' | translate }}
        </button>
      </div>
    </div>
  </div>
</div>
<app-not-found [isVisible]="!binTableData?.length && !loading"></app-not-found>
