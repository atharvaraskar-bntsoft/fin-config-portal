<div>
  <h2 mat-dialog-title>Add New Property</h2>
  <form [formGroup]="addNewProperty" (ngSubmit)="saveItem(addNewProperty.value)">
    <mat-dialog-content>
      <div class="form-group">
        <label class="required">Type</label>
        <select
          class="form-control popup"
          placeholder="Select type"
          name="type"
          required
          formControlName="type"
        >
          <option value="message">Message</option>
          <option value="network">Network</option>
        </select>
      </div>
      <div class="form-group" [ngClass]="displayFieldCss('key')">
        <label class="required">Name: </label>
        <input
          class="form-control popup"
          type="text"
          required
          maxlength="100"
          placeholder="Name"
          rv-noSpaces
          formControlName="key"
          (keydown)="utils.checkValidField($event.key)"
        />
        <app-field-error-display [displayError]="addNewProperty.controls['key'].touched && addNewProperty.controls['key'].hasError('required')" errorMsg="Name is required">
        </app-field-error-display>
        <app-field-error-display [displayError]="addNewProperty.controls['key'].touched && addNewProperty.controls['key'].hasError('pattern')" errorMsg="Please enter Valid Value">
        </app-field-error-display>
      </div>
      <div class="form-group" [ngClass]="displayFieldCss('label')">
        <label class="required">Label: </label>
        <input
          class="form-control popup"
          type="text"
          maxlength="80"
          required
          placeholder="Label"
          rv-noSpaces
          formControlName="label"
        />
        <app-field-error-display
          [displayError]="isFieldValid('label')"
          errorMsg="Label is required"
        >
        </app-field-error-display>
      </div>
      <div *ngIf="!copyObj.isFile" class="form-group" [ngClass]="displayFieldCss('defaultvalue')">
        <label>Default value: </label>
        <input
          class="form-control popup"
          type="text"
          maxlength="100"
          placeholder="Default value"
          rv-noSpaces
          formControlName="defaultvalue"
        />
      </div>
      <div class="form-group" [ngClass]="displayFieldCss('isFile')">
        <label class="check_box_container label-width">
          File Type:
          <input
            [ngModel]="copyObj.isFile"
            formControlName="isFile"
            (click)="checkFileStatus()"
            type="checkbox"
            checked
          />
          <span class="checkmark"></span>
        </label>
        <app-field-error-display
          [displayError]="isFieldValid('isFile')"
          errorMsg="File Type is required"
        >
        </app-field-error-display>
      </div>
      <div class="form-group" *ngIf="copyObj.isFile" [ngClass]="displayFieldCss('listvalues')">
        <label>List values: </label>
        <select
          class="form-control popup"
          placeholder="Select file extension"
          name="listvalues"
          multiple
          formControlName="listvalues"
        >
          <option value=".XML">xml</option>
          <option value=".JSON">json</option>
          <option value=".JKS">jks</option>
        </select>
        <app-field-error-display
          [displayError]="isFieldValid('listvalues')"
          errorMsg="Please Select file extension."
        >
        </app-field-error-display>
      </div>
      <div class="form-group" *ngIf="!copyObj.isFile" [ngClass]="displayFieldCss('listvalues')">
        <label>List values: </label>
        <input
          class="form-control popup"
          type="text"
          maxlength="40"
          placeholder="List values should be comma separated"
          formControlName="listvalues"
        />
        <app-field-error-display
          [displayError]="isFieldValid('listvalues')"
          errorMsg="Please Enter Comma Separated Values Only."
        >
        </app-field-error-display>
      </div>
      <div class="form-check-input" [ngClass]="displayFieldCss('mandatory')">
        <div>
          <label class="check_box_container label-width">
            Mandatory
            <input (click)="checkStatus()" type="checkbox" formControlName="mandatory" checked />
            <span class="checkmark"></span>
          </label>
        </div>
        <app-field-error-display
          [displayError]="isFieldValid('mandatory')"
          errorMsg="Mandatory is required"
        >
        </app-field-error-display>
      </div>
    </mat-dialog-content>
    <mat-dialog-actions>
      <button nz-button mat-dialog-close nzType="default">
        {{ 'CLOSE' | translate }}
      </button>
      <!-- <button nz-button nzType="primary" (click)="saveItem()">
      {{ 'Save' | translate }}
    </button> -->
      <button nz-button nzType="primary">
        {{ 'Save' | translate }}
      </button>
    </mat-dialog-actions>
  </form>
</div>
<!-- </nz-modal> -->
