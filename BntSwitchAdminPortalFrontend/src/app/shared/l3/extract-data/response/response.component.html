<ng-container *ngIf="!showAddParamPopup">
    <div class="form-group">
        <div class="row">
            <div class="col-sm-12 text-right">
                <button class="btn btn-default" (click)="addBlockList()">
                    <i class="fa fa-plus"></i> Add Block
                </button>
            </div>
        </div>
    </div>
    <div class="card-main-acco" *ngFor="let item of blockList; let a = index">
        <div class="card-header">
            <label for="Post Validation">BLOCK {{ a + 1 }}</label>
            <div class="card-icon">
                <i class="fa fa-angle-down" (click)="collapseBlockList(item)"></i>
                <i class="fa fa-trash" (click)="removeBlockList(a)"></i>
            </div>
        </div>
        <div class="card-body" *ngIf="item.collapse">
            <ng-container>
                <div class="form-group">
                    <div class="row">
                        <div class="col-md-2 text-label-right">
                            <label>Steps</label>
                        </div>
                        <div class="col-md-2">
                            <span class="btn btn-default" (click)="addBlockStep(item.transformArray)">
                                <i class="fa fa-plus"></i></span>
                        </div>
                    </div>
                </div>
            </ng-container>
            <ng-container *ngFor="let block of item.transformArray; let i = index">
                <div class="form-group">
                    <div class="row">
                        <div class="col-md-2 text-label-right">
                            <label class="required">Step {{ i + 1 }}</label>
                        </div>
                        <div class="col-md-3">
                            <ng-select [clearable]="false" class="filter-shadow" style="width: 100%"
                                [closeOnSelect]="true" bindLabel="actionName" [items]="stepList"
                                [(ngModel)]="block.value" placeholder="Select Value"
                                (change)="stepFunction(block.value, a, i)">
                            </ng-select>
                        </div>
                        <div class="col-md-2 auto-width nopadding-lg" *ngIf="
                    block.value &&
                    block.function &&
                    block.function.parameters &&
                    block.function.parameters.length
                  ">
                            <a (click)="stepFunction(block.value, a, i, true, false)" style="font-size: 11px;">Edit
                                Parameter</a>
                        </div>
                        <div class="col-md-1 auto-width">
                            <span class="btn btn-default" *ngIf="item.transformArray.length > 0"
                                (click)="removeBlockStep(i, item.transformArray)"><i class="fa fa-minus"></i></span>
                        </div>
                    </div>
                </div>
            </ng-container>
            <ng-container>
                <div class="form-group">
                    <div class="row">
                        <div class="col-md-2 text-label-right">
                            <label>Evaluate</label>
                        </div>
                        <div class="col-md-2">
                            <span class="btn btn-default" *ngIf="!item.customMapper" (click)="addCustomMap(item)"><i
                                    class="fa fa-plus"></i></span>
                            <span class="btn btn-default"
                                *ngIf="item.customMapper && item.customMapper.mapper.length > 0"
                                (click)="addMap(item.customMapper)"><i class="fa fa-plus"></i></span>
                        </div>
                    </div>
                </div>
            </ng-container>
            <ng-container *ngIf="item.customMapper">
                <div class="form-group" *ngFor="let block of item.customMapper.mapper; let i = index">
                    <div class="row">
                        <div class="col-sm-2"></div>
                        <div class="col-md-3">
                            <input class="form-control" type="text" [(ngModel)]="block.value1" />
                        </div>
                        <div class="col-md-1 auto-width nopadding-lg">
                            <label>=</label>
                        </div>
                        <div class="col-sm-3">
                            <nz-tree-select class="evaluate-lookup form-control" [nzDropdownMatchSelectWidth]="true"
                                [nzDropdownStyle]="{ 'max-height': '200px' }" [nzShowExpand]="true"
                                [nzNodes]="lookupList" [nzShowSearch]="true" [nzHideUnMatched]="true"
                                nzPlaceHolder="Please select" [(ngModel)]="block.value2">
                            </nz-tree-select>
                        </div>
                        <div class="col-sm-2">
                            <input class="toto input-align input-search form-control" type="text"
                                [(ngModel)]="block.value2" />
                        </div>
                        <div class="col-sm-1">
                            <span class="btn btn-default"
                                *ngIf="item.customMapper && item.customMapper.mapper.length === 1"
                                (click)="removeCustomMap(item)">
                                <i class="fa fa-minus"></i></span>
                            <span class="btn btn-default"
                                *ngIf="item.customMapper && item.customMapper.mapper.length > 1"
                                (click)="removemMap(item.customMapper, i)"><i class="fa fa-minus"></i></span>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <div class="row">
                        <div class="col-md-2 text-label-right">
                            <label style="margin-right: 7px">Default Value </label>
                        </div>
                        <div class="col-sm-3">
                            <input class="toto input-align input-search form-control" type="text"
                                [(ngModel)]="item.customMapper.defaultValue" placeholder="Default Value" />
                        </div>
                        <div class="col-md-4">
                            <label style="margin-right: 31px">Use same on match fail</label>
                            <input type="checkbox" [(ngModel)]="item.customMapper.useSameOnMatchFail" />
                        </div>
                    </div>
                </div>
            </ng-container>
            <div class="form-group">
                <div class="row">
                    <div class="col-md-2 text-label-right">
                        <label for="Post Validation">Post Validation</label>
                    </div>
                    <div class="col-md-2">
                        <span class="btn btn-default" (click)="addValidation(item.PostValidation)">
                            <i class="fa fa-plus"></i></span>
                    </div>
                </div>
            </div>
            <div *ngFor="let valid of item.PostValidation; let j = index">
                <div class="form-group">
                    <div class="row">
                        <div class="col-sm-2"></div>
                        <div class="col-md-3">
                            <ng-select [clearable]="false" class="filter-shadow" style="width: 100%"
                                [closeOnSelect]="true" [items]="validationList" [(ngModel)]="valid['validation']"
                                bindLabel="name" placeholder="Select validation" (change)="validationParam(valid)">
                                <ng-template ng-option-tmp let-item="item">
                                    <div [title]="item.parameters.tooltip" *ngIf="item.parameters">
                                        {{ item.name }}
                                    </div>
                                    <div *ngIf="!item.parameters">{{ item.name }}</div>
                                </ng-template>
                            </ng-select>
                        </div>
                        <div class="col-md-3" *ngIf="valid.operatorList && valid.operatorList.length > 0">
                            <ng-select [clearable]="false" class="filter-shadow" style="width: 100%"
                                [closeOnSelect]="true" [items]="valid.operatorList" [(ngModel)]="valid['operator']"
                                bindLabel="label" placeholder="Select Operator">
                            </ng-select>
                        </div>
                        <div class="col-md-3" *ngFor="let param of valid.params">
                            <ng-select [clearable]="false" class="filter-shadow" style="width: 100%"
                                [closeOnSelect]="true" bindValue="id" bindLabel="name" [items]="param.list"
                                [(ngModel)]="param.value" placeholder="{{ param.name }}"
                                *ngIf="param.label === 'source'">
                                <ng-template ng-option-tmp let-item="item">
                                    <div [title]="item.tooltip">{{ item.name }}</div>
                                </ng-template>
                            </ng-select>
                            <ng-select [clearable]="false" class="filter-shadow" style="width: 100%"
                                [closeOnSelect]="true" bindLabel="alias" bindValue="name" [items]="param.list"
                                [(ngModel)]="param.value" placeholder="{{ param.name }}" *ngIf="param.label === 'imf'">
                                <ng-template ng-option-tmp let-item="item">
                                    <div [title]="item.name">{{ item.alias }}</div>
                                </ng-template>
                            </ng-select>
                            <input class="toto input-align input-search form-control" type="text"
                                [(ngModel)]="param.value" placeholder="{{ param.name }}"
                                *ngIf="!param.list && param.type !== 'Integer'" />
                            <input class="toto input-align input-search form-control" type="number"
                                [(ngModel)]="param.value" placeholder="{{ param.name }}"
                                *ngIf="!param.list && param.type === 'Integer'" />
                        </div>
                        <div class="col-sm-1">
                            <span class="btn btn-default" *ngIf="item.PostValidation.length > 0"
                                (click)="removeValidation(item.PostValidation, j)">
                                <i class="fa fa-minus"></i></span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <div class="row">
                    <div class="col-md-2 text-label-right">
                        <label class="required">Assign value to internal field</label>
                    </div>
                    <div class="col-md-3">
                        <app-imf-tree-structure-res [networkService]="networkService" [isRequest]="isRequest"
                            [index]="a" [imfId]="imfId" [imfValue]="item.IMFvalue"
                            (emitIMFValue)="getImfFn($event, 'extractIMF')">
                        </app-imf-tree-structure-res>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <div class="row">
                    <div class="col-md-2 text-label-right">
                        <label class="required">Set IPC</label>
                    </div>
                    <div class="col-md-3">
                        <ng-select [clearable]="false" class="filter-shadow" [closeOnSelect]="true" bindValue="value"
                            bindLabel="value" [items]="ipcList" [(ngModel)]="item.IPCvalue" placeholder="Select IPC">
                        </ng-select>
                    </div>
                </div>
            </div>
            <mat-divider *ngIf="blockList.length > 1 && a !== blockList.length - 1"></mat-divider>
        </div>
    </div>
    <span *ngIf="extractError || conditionError" style="color: red">Please fill all mandatory fields</span>
    <div class="row row-margin row-align r  ow-template pull-right">
        <div class="col-sm-12">
            <button nz-button nzType="default" (click)="cancel()">Cancel</button>
            <button nz-button nzType="primary" [disabled]="!field" style="margin-left: 10px" (click)="save()">
                Save
            </button>
        </div>
    </div>
</ng-container>
<div class="RuleDiv" *ngIf="showAddParamPopup" style="height: 300px">
    <app-common-parameter [sourceList]="sourceList" [ipcList]="ipcList" (isVisible)="closeParamPopup($event)"
        (parameter)="addParam($event)" [imfList]="jsonData" [selectedStepParameter]="selectedStepParameter">
    </app-common-parameter>
</div>
