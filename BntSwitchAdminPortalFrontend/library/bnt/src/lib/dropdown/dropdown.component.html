<ng-template #innerTemplate>
  <ng-container
    *ngIf="
      this.dropdownToggleComponent && this.dropdownToggleComponent.toggleElement;
      else noToggleElement
    "
    [ngTemplateOutlet]="dropdownToggleComponent.templateRef"
  ></ng-container>
  <ng-template #noToggleElement>
    <button
      *ngIf="toggleText || dropdownToggleComponent"
      [rvColor]="buttonBackgroudColor"
      rvColorProperty="background-color"
      rvColorPrefix="btn"
      [ngClass]="buttonStyleClass"
      #defaultToggleElement
    >
      {{ toggleText }}
      <ng-container [ngTemplateOutlet]="dropdownToggleComponent?.templateRef"></ng-container>
    </button>
  </ng-template>
  <ul
    [ngClass]="contentStyleClass"
    [rvCollapseAnimation]="isCollapsed"
    (rvCollapseAnimation.start)="collapseStart($event)"
    (rvCollapseAnimation.done)="collapseDone($event)"
  >
    <ng-container
      *ngIf="dropdownMenuComponent; else noDropdownMenuComponent"
      [ngTemplateOutlet]="dropdownMenuComponent.templateRef"
    ></ng-container>
    <ng-template #noDropdownMenuComponent>
      <ng-content></ng-content>
    </ng-template>
  </ul>
</ng-template>

<div *ngIf="isWrapper; else noWrapper" [ngClass]="styleClass">
  <ng-container *ngTemplateOutlet="innerTemplate"></ng-container>
</div>

<ng-template #noWrapper>
  <ng-container *ngTemplateOutlet="innerTemplate"></ng-container>
</ng-template>
