<div [ngClass]="styleClass">
  <div
    *ngFor="let accordion of accordionComponents"
    class="panel box"
    [rvColor]="accordion.borderColor"
    rvColorProperty="border-top-color"
    rvColorPrefix="box"
  >
    <div
      [ngClass]="accordion.headerStyleClass"
      [class.no-border]="accordion.isCollapsed && !accordion.isCollapsing"
    >
      <h4 class="box-title">
        <a
          [rvAccordionToggle]="accordion"
          href="#"
          [rvFontColor]="accordion.headerStyleColor"
          [class.collapsed]="accordion.isCollapsed"
        >
          {{ accordion.header }}
          <ng-template
            *ngIf="!accordion.header"
            [ngTemplateOutlet]="accordion.accordionHeaderComponent?.templateRef"
          ></ng-template>
        </a>
      </h4>
    </div>
    <div
      class="panel-collapse"
      [rvCollapseAnimation]="accordion.isCollapsed"
      (rvCollapseAnimation.start)="collapseStart($event, accordion)"
      (rvCollapseAnimation.done)="collapseDone($event, accordion)"
    >
      <div [ngClass]="accordion.contentStyleClass" [rvFontColor]="accordion.contentColor">
        <ng-template [ngTemplateOutlet]="accordion.contentTemplateRef"></ng-template>
      </div>
    </div>
  </div>
</div>
