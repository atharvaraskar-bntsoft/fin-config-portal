<div [ngClass]="styleClass" [rvColor]="backgroundColor" rvColorProperty="background-color">
  <span class="info-box-icon" [rvColor]="iconBackgroundColor" rvColorProperty="background-color">
    <i [ngClass]="iconStyleClass" [rvFontColor]="iconColor"></i>
    {{ header }}
  </span>
  <div class="info-box-content">
    <span
      *ngIf="header || boxInfoHeaderDirective"
      [ngClass]="headerStyleClass"
      [rvFontColor]="headerColor"
    >
      <ng-content select="rv-box-header"></ng-content>
    </span>
    <span [ngClass]="contentStyleClass" [rvFontColor]="contentColor">
      <ng-container
        *ngIf="
          boxInfoHeaderDirective || boxInfoContentDirective || boxInfoFooterDirective;
          else noDirective
        "
      >
        <ng-content select="rv-box-content"></ng-content>
      </ng-container>
      <ng-template #noDirective>
        <ng-content></ng-content>
      </ng-template>
    </span>
    <div *ngIf="progressWidth" class="progress">
      <div
        class="progress-bar"
        [rvColor]="progressBarBg"
        rvColorProperty="background-color"
        [style.width.%]="progressWidth"
      ></div>
    </div>
    <span
      *ngIf="footer || boxInfoFooterDirective"
      [ngClass]="footerStyleClass"
      [rvFontColor]="footerColor"
    >
      {{ footer }}
      <ng-content select="rv-box-footer"></ng-content>
    </span>
  </div>
</div>
